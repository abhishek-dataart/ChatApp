<div class="field" [class.has-error]="error()">
  @if (label()) {
    <label class="label">{{ label() }}</label>
  }
  <input
    class="input"
    [type]="type()"
    [placeholder]="placeholder() ?? ''"
    [value]="value()"
    [disabled]="isDisabled()"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
  />
  @if (error()) {
    <span class="helper error-text">{{ error() }}</span>
  } @else if (hint()) {
    <span class="helper hint-text">{{ hint() }}</span>
  }
</div>
