<div class="auth-layout">
  <div class="auth-brand">
    <div class="auth-brand__logo">C</div>
    <h1 class="auth-brand__title">ChatApp</h1>
  </div>

  <div class="auth-card-wrapper">
    <ui-card padding="lg" class="auth-card">
      <h2 class="auth-card__heading">Forgot password</h2>

      @if (sent()) {
        <p>
          If an account exists for that email, a password reset link has been sent.
          Check the server log in development.
        </p>
        <p class="auth-alt"><a routerLink="/login">Back to sign in</a></p>
      } @else {
        <form [formGroup]="form" (ngSubmit)="submit()" novalidate class="auth-form">
          <p>Enter your email to reset your password.</p>
          <div class="field">
            <label for="email" class="field__label">Email</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              autocomplete="email"
              class="field__input"
              placeholder="you@example.com"
            />
          </div>
          <ui-button
            type="submit"
            variant="primary"
            size="md"
            [loading]="submitting()"
            [disabled]="submitting()"
            style="width: 100%"
          >
            Send reset link
          </ui-button>
        </form>
        <p class="auth-alt"><a routerLink="/login">Back to sign in</a></p>
      }
    </ui-card>
  </div>
</div>
