map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream chatapp_api {
    server api:8080;
}

server {
    listen 80 default_server;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; frame-ancestors 'none'; form-action 'self';" always;

    # Angular SPA.
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets.
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # REST API.
    location /api/ {
        proxy_pass http://chatapp_api;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # API middleware already sets these; hide upstream copies to avoid duplicates.
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
    }

    # SignalR hubs — WebSocket upgrade.
    location /hub/ {
        proxy_pass http://chatapp_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $http_host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
    }

    # Shared health endpoint exposed by the api container, not the SPA.
    location = /healthz {
        proxy_pass http://chatapp_api/health;
    }

    # SPA fallback — all unmatched routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
